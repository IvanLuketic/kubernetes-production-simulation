apiVersion: apps/v1
kind: Deployment

metadata:
  name: fastapi

spec:
  replicas: 2

  selector:
    matchLabels:
      app: fastapi

  template:
    metadata:
      labels:
        app: fastapi

    spec:
      containers:
      - name: fastapi
        image: fastapi-k8s:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
